<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  color: #fff;
  min-height: 100vh;
  overflow: hidden;
  line-height: 1.6;
  background: #0a1628;
}

/* Sky */
.sky {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; z-index: -2;
  background: linear-gradient(180deg, #0a1628 0%, #1a3a5c 25%, #4a90d9 50%, #87ceeb 75%, #c8a8e8 100%);
}

/* Stars */
.stars { position: fixed; top: 0; left: 0; width: 100%; height: 40%; z-index: -1; pointer-events: none; }
.star {
  position: absolute; width: 2px; height: 2px;
  background: #fff; border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.2; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.5); }
}

/* ===== Sidebar ===== */
.sidebar {
  position: fixed;
  left: 0; top: 50%; transform: translateY(-50%);
  z-index: 160;
  display: flex; flex-direction: column; gap: 0.5rem;
  padding: 0.6rem;
  background: rgba(10, 16, 30, 0.5);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-radius: 0 16px 16px 0;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-left: none;
}
.sidebar-btn {
  display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
  padding: 0.6rem 0.5rem; border-radius: 12px;
  color: rgba(255, 255, 255, 0.5);
  text-decoration: none; transition: all 0.25s ease;
  min-width: 48px;
}
.sidebar-btn:hover { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.85); }
.sidebar-btn.active { background: rgba(255, 107, 157, 0.3); color: #ff6b9d; }
.sidebar-label { font-size: 0.6rem; font-weight: 500; white-space: nowrap; }

/* ===== Graph Page ===== */
.graph-page {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  padding: 1rem 1rem 1rem 4rem;
  display: flex; flex-direction: column;
  z-index: 1;
}

.graph-header {
  text-align: center;
  margin-bottom: 1rem;
  flex-shrink: 0;
}
.graph-header h1 {
  font-size: clamp(1.3rem, 3vw, 2rem);
  font-weight: 600;
  color: rgba(255, 255, 255, 0.9);
  margin-bottom: 0.2rem;
}
.graph-header p {
  color: rgba(255, 255, 255, 0.45);
  font-size: 0.85rem;
}

.graph-container {
  flex: 1;
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  position: relative;
  cursor: grab;
}
.graph-container:active { cursor: grabbing; }
.graph-container canvas { display: block; width: 100%; height: 100%; }

.graph-tooltip {
  position: absolute; pointer-events: none;
  background: rgba(10, 22, 40, 0.9);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 12px; padding: 0.6rem 1rem;
  color: #fff; font-size: 0.8rem; line-height: 1.5;
  opacity: 0; transition: opacity 0.2s ease;
  white-space: nowrap; z-index: 10;
}
.graph-tooltip.visible { opacity: 1; }
.graph-tooltip .tt-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.15rem; }
.graph-tooltip .tt-artist { color: rgba(255, 255, 255, 0.6); font-size: 0.8rem; }
.graph-tooltip .tt-tag { color: rgba(255, 107, 157, 0.9); font-size: 0.75rem; }

.graph-legend {
  display: flex; justify-content: center; gap: 1.5rem;
  margin-top: 0.8rem; flex-shrink: 0;
}
.legend-item {
  display: flex; align-items: center; gap: 0.4rem;
  font-size: 0.8rem; color: rgba(255, 255, 255, 0.6);
}
.legend-line { display: inline-block; width: 28px; height: 3px; border-radius: 2px; }
.artist-line { background: #ff6b9d; height: 4px; }
.tag-line { background: #87ceeb; }

@media (max-width: 768px) {
  .graph-page { padding: 0.5rem 0.5rem 0.5rem 3.5rem; }
  .graph-header h1 { font-size: 1.1rem; }
}

// ============================================================
// Force-Directed Graph Engine
// ============================================================
const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');
const graphTooltipEl = document.getElementById('graphTooltip');
const NODE_RADIUS = 32;

let graphNodes = [];
let graphEdges = [];
let graphAnim = null;
let graphHover = null;
let graphDrag = null;
let graphPan = { x: 0, y: 0 };
let graphScale = 1;
let graphPanStart = null;
let graphPanStartMouse = null;
let coverImages = {};

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function buildGraph() {
  graphNodes = albums.map((a, i) => ({
    idx: i,
    x: (Math.random() - 0.5) * 400,
    y: (Math.random() - 0.5) * 400,
    vx: 0, vy: 0,
    album: a
  }));

  graphEdges = [];
  for (let i = 0; i < albums.length; i++) {
    for (let j = i + 1; j < albums.length; j++) {
      const a = albums[i], b = albums[j];
      if (a.artist === b.artist) {
        graphEdges.push({ source: i, target: j, type: 'artist', label: a.artist });
      }
      const shared = a.tags.filter(t => b.tags.includes(t));
      shared.forEach(t => {
        if (t !== '经典') {
          graphEdges.push({ source: i, target: j, type: 'tag', label: t });
        }
      });
    }
  }

  albums.forEach((a, i) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = a.cover;
    img.onload = () => { coverImages[i] = img; };
  });

  if (graphAnim) cancelAnimationFrame(graphAnim);
  simulateGraph();
}

function simulateGraph() {
  const repulsion = 8000;
  const springLen = 180;
  const springK = 0.005;
  const centerK = 0.01;
  const damping = 0.85;

  for (let i = 0; i < graphNodes.length; i++) {
    for (let j = i + 1; j < graphNodes.length; j++) {
      const a = graphNodes[i], b = graphNodes[j];
      let dx = a.x - b.x, dy = a.y - b.y;
      let dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) dist = 1;
      const force = repulsion / (dist * dist);
      const fx = (dx / dist) * force, fy = (dy / dist) * force;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    }
  }

  graphEdges.forEach(e => {
    const a = graphNodes[e.source], b = graphNodes[e.target];
    let dx = b.x - a.x, dy = b.y - a.y;
    let dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) dist = 1;
    const force = (dist - springLen) * springK;
    const fx = (dx / dist) * force, fy = (dy / dist) * force;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  });

  graphNodes.forEach(n => { n.vx -= n.x * centerK; n.vy -= n.y * centerK; });

  graphNodes.forEach(n => {
    if (n === graphDrag) return;
    n.vx *= damping; n.vy *= damping;
    n.x += n.vx; n.y += n.vy;
  });

  renderGraph();
  graphAnim = requestAnimationFrame(simulateGraph);
}

function renderGraph() {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width / dpr, h = canvas.height / dpr;

  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  ctx.translate(w / 2 + graphPan.x, h / 2 + graphPan.y);
  ctx.scale(graphScale, graphScale);

  const connectedSet = new Set();
  if (graphHover !== null) {
    connectedSet.add(graphHover);
    graphEdges.forEach(e => {
      if (e.source === graphHover) connectedSet.add(e.target);
      if (e.target === graphHover) connectedSet.add(e.source);
    });
  }

  // Edges
  graphEdges.forEach(e => {
    const a = graphNodes[e.source], b = graphNodes[e.target];
    const isHovered = graphHover !== null && (e.source === graphHover || e.target === graphHover);
    const isDimmed = graphHover !== null && !isHovered;
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    const perpX = -(dy / (dist || 1)) * 20, perpY = (dx / (dist || 1)) * 20;
    const sign = e.type === 'artist' ? -1 : 1;
    const cx = mx + perpX * sign, cy = my + perpY * sign;

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.quadraticCurveTo(cx, cy, b.x, b.y);

    if (e.type === 'artist') {
      ctx.strokeStyle = isHovered ? 'rgba(255,107,157,0.9)' : isDimmed ? 'rgba(255,107,157,0.08)' : 'rgba(255,107,157,0.35)';
      ctx.lineWidth = isHovered ? 3 : 2;
    } else {
      ctx.strokeStyle = isHovered ? 'rgba(135,206,235,0.9)' : isDimmed ? 'rgba(135,206,235,0.05)' : 'rgba(135,206,235,0.2)';
      ctx.lineWidth = isHovered ? 2.5 : 1;
    }
    ctx.stroke();

    if (isHovered) {
      ctx.save();
      ctx.font = '11px Quicksand, sans-serif';
      ctx.fillStyle = e.type === 'artist' ? 'rgba(255,107,157,0.95)' : 'rgba(135,206,235,0.95)';
      ctx.textAlign = 'center';
      ctx.fillText(e.label, cx, cy - 6);
      ctx.restore();
    }
  });

  // Nodes
  graphNodes.forEach((n, i) => {
    const isHoveredNode = i === graphHover;
    const isConnected = graphHover !== null && connectedSet.has(i);
    const isDimmed = graphHover !== null && !isConnected;

    ctx.save();
    ctx.globalAlpha = isDimmed ? 0.2 : 1;
    ctx.shadowColor = isHoveredNode ? 'rgba(255,107,157,0.6)' : 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = isHoveredNode ? 20 : 10;
    ctx.shadowOffsetY = 4;

    ctx.beginPath();
    ctx.arc(n.x, n.y, NODE_RADIUS, 0, Math.PI * 2);
    ctx.closePath();

    if (coverImages[i]) {
      ctx.save(); ctx.clip();
      ctx.drawImage(coverImages[i], n.x - NODE_RADIUS, n.y - NODE_RADIUS, NODE_RADIUS * 2, NODE_RADIUS * 2);
      ctx.restore();
    } else {
      ctx.fillStyle = 'rgba(26,58,92,0.8)'; ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(n.x, n.y, NODE_RADIUS, 0, Math.PI * 2);
    ctx.strokeStyle = isHoveredNode ? '#ff6b9d' : isConnected ? 'rgba(255,107,157,0.6)' : 'rgba(255,255,255,0.25)';
    ctx.lineWidth = isHoveredNode ? 3 : 1.5;
    ctx.stroke();
    ctx.restore();
  });

  ctx.restore();
}

function resizeGraphCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
}

function getNodeAt(mx, my) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width / dpr, h = canvas.height / dpr;
  const sx = (mx - w / 2 - graphPan.x) / graphScale;
  const sy = (my - h / 2 - graphPan.y) / graphScale;
  for (let i = graphNodes.length - 1; i >= 0; i--) {
    const n = graphNodes[i];
    const dx = sx - n.x, dy = sy - n.y;
    if (dx * dx + dy * dy <= NODE_RADIUS * NODE_RADIUS) return i;
  }
  return null;
}

function initGraph() {
  resizeGraphCanvas();
  window.addEventListener('resize', resizeGraphCanvas);

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;

    if (graphDrag !== null) {
      const dpr = window.devicePixelRatio || 1;
      graphNodes[graphDrag].x = (mx - canvas.width / dpr / 2 - graphPan.x) / graphScale;
      graphNodes[graphDrag].y = (my - canvas.height / dpr / 2 - graphPan.y) / graphScale;
      graphNodes[graphDrag].vx = 0; graphNodes[graphDrag].vy = 0;
      return;
    }
    if (graphPanStart) {
      graphPan.x = graphPanStart.x + (e.clientX - graphPanStartMouse.x);
      graphPan.y = graphPanStart.y + (e.clientY - graphPanStartMouse.y);
      return;
    }

    const node = getNodeAt(mx, my);
    graphHover = node;
    if (node !== null) {
      canvas.style.cursor = 'pointer';
      const n = graphNodes[node];
      graphTooltipEl.innerHTML = `<div class="tt-title">${escapeHtml(n.album.title)}</div><div class="tt-artist">${escapeHtml(n.album.artist)}</div><div class="tt-tag">${n.album.tags.join(' / ')}</div>`;
      graphTooltipEl.classList.add('visible');
      graphTooltipEl.style.left = (mx + 16) + 'px';
      graphTooltipEl.style.top = (my - 10) + 'px';
    } else {
      canvas.style.cursor = 'grab';
      graphTooltipEl.classList.remove('visible');
    }
  });

  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const node = getNodeAt(mx, my);
    if (node !== null) {
      graphDrag = node; canvas.style.cursor = 'grabbing';
    } else {
      graphPanStart = { x: graphPan.x, y: graphPan.y };
      graphPanStartMouse = { x: e.clientX, y: e.clientY };
      canvas.style.cursor = 'grabbing';
    }
  });

  window.addEventListener('mouseup', () => {
    graphDrag = null; graphPanStart = null; graphPanStartMouse = null;
  });

  canvas.addEventListener('mouseleave', () => {
    graphHover = null; graphTooltipEl.classList.remove('visible');
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    graphScale = Math.max(0.2, Math.min(5, graphScale * (e.deltaY > 0 ? 0.9 : 1.1)));
  }, { passive: false });

  // Touch
  let touchDist = null;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const t = e.touches[0], rect = canvas.getBoundingClientRect();
      const node = getNodeAt(t.clientX - rect.left, t.clientY - rect.top);
      if (node !== null) { graphDrag = node; }
      else {
        graphPanStart = { x: graphPan.x, y: graphPan.y };
        graphPanStartMouse = { x: t.clientX, y: t.clientY };
      }
    } else if (e.touches.length === 2) {
      graphDrag = null;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      touchDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const t = e.touches[0], rect = canvas.getBoundingClientRect();
      const mx = t.clientX - rect.left, my = t.clientY - rect.top;
      if (graphDrag !== null) {
        const dpr = window.devicePixelRatio || 1;
        graphNodes[graphDrag].x = (mx - canvas.width / dpr / 2 - graphPan.x) / graphScale;
        graphNodes[graphDrag].y = (my - canvas.height / dpr / 2 - graphPan.y) / graphScale;
        graphNodes[graphDrag].vx = 0; graphNodes[graphDrag].vy = 0;
      } else if (graphPanStart) {
        graphPan.x = graphPanStart.x + (t.clientX - graphPanStartMouse.x);
        graphPan.y = graphPanStart.y + (t.clientY - graphPanStartMouse.y);
      }
    } else if (e.touches.length === 2 && touchDist) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const newDist = Math.sqrt(dx * dx + dy * dy);
      graphScale = Math.max(0.2, Math.min(5, graphScale * (newDist / touchDist)));
      touchDist = newDist;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', () => {
    graphDrag = null; graphPanStart = null; graphPanStartMouse = null; touchDist = null;
  });
}

// Init
initGraph();
buildGraph();
</script>
</body>

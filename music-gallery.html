<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disboundia Music Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ===== Sky Background ===== */
.sky {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -2;
  background: linear-gradient(180deg,
    #0a1628 0%,
    #1a3a5c 25%,
    #4a90d9 50%,
    #87ceeb 75%,
    #c8a8e8 100%
  );
  transition: background 0.3s ease;
}

/* Stars */
.stars {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 40%;
  z-index: -1;
  pointer-events: none;
}

.star {
  position: absolute;
  width: 2px; height: 2px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite alternate;
}

@keyframes twinkle {
  0% { opacity: 0.2; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.5); }
}

/* ===== Clouds ===== */
.clouds {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}

.cloud {
  position: absolute;
  background: rgba(255, 255, 255, 0.12);
  border-radius: 50%;
  filter: blur(1px);
}

.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: inherit;
  border-radius: 50%;
}

.cloud-1 {
  width: 200px; height: 60px;
  top: 8%; left: -5%;
  animation: float-cloud 45s linear infinite;
}
.cloud-1::before { width: 80px; height: 80px; top: -40px; left: 30px; }
.cloud-1::after { width: 100px; height: 70px; top: -30px; left: 80px; }

.cloud-2 {
  width: 280px; height: 70px;
  top: 15%; left: 30%;
  animation: float-cloud 60s linear infinite;
  animation-delay: -15s;
  opacity: 0.8;
}
.cloud-2::before { width: 100px; height: 90px; top: -45px; left: 50px; }
.cloud-2::after { width: 120px; height: 80px; top: -35px; left: 120px; }

.cloud-3 {
  width: 160px; height: 50px;
  top: 25%; left: 65%;
  animation: float-cloud 50s linear infinite;
  animation-delay: -25s;
  opacity: 0.6;
}
.cloud-3::before { width: 70px; height: 65px; top: -30px; left: 25px; }
.cloud-3::after { width: 80px; height: 55px; top: -25px; left: 65px; }

.cloud-4 {
  width: 240px; height: 65px;
  top: 35%; left: -10%;
  animation: float-cloud 55s linear infinite;
  animation-delay: -35s;
  opacity: 0.5;
}
.cloud-4::before { width: 90px; height: 85px; top: -40px; left: 40px; }
.cloud-4::after { width: 110px; height: 75px; top: -30px; left: 100px; }

.cloud-5 {
  width: 180px; height: 55px;
  top: 50%; left: 45%;
  animation: float-cloud 48s linear infinite;
  animation-delay: -10s;
  opacity: 0.4;
}
.cloud-5::before { width: 75px; height: 70px; top: -35px; left: 35px; }
.cloud-5::after { width: 90px; height: 60px; top: -28px; left: 80px; }

@keyframes float-cloud {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(calc(100vw + 100%)); }
}

/* ===== Hero Section ===== */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 2rem;
  position: relative;
}

.hero-title {
  font-size: clamp(2.5rem, 8vw, 5rem);
  font-weight: 700;
  letter-spacing: 0.05em;
  background: linear-gradient(135deg, #fff 0%, #87ceeb 40%, #c8a8e8 70%, #ff6b9d 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 1rem;
  text-shadow: none;
}

.hero-subtitle {
  font-size: clamp(1rem, 3vw, 1.4rem);
  font-weight: 300;
  color: rgba(255, 255, 255, 0.7);
  max-width: 600px;
  margin-bottom: 2rem;
}

.scroll-hint {
  position: absolute;
  bottom: 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  color: rgba(255, 255, 255, 0.5);
  font-size: 0.85rem;
  animation: bounce-down 2s ease-in-out infinite;
}

.scroll-hint-arrow {
  width: 20px; height: 20px;
  border-right: 2px solid rgba(255, 255, 255, 0.5);
  border-bottom: 2px solid rgba(255, 255, 255, 0.5);
  transform: rotate(45deg);
}

@keyframes bounce-down {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

/* ===== Gallery Section ===== */
.gallery {
  position: relative;
  padding: 2rem 1.5rem 6rem;
  max-width: 1200px;
  margin: 0 auto;
}

.gallery-header {
  text-align: center;
  margin-bottom: 3rem;
}

.gallery-header h2 {
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 600;
  color: rgba(255, 255, 255, 0.9);
  margin-bottom: 0.5rem;
}

.gallery-header p {
  color: rgba(255, 255, 255, 0.5);
  font-size: 0.95rem;
}

/* Search Bar */
.search-bar {
  max-width: 480px;
  margin: 0 auto 1.5rem;
  position: relative;
}

.search-bar input {
  width: 100%;
  padding: 0.65rem 1rem 0.65rem 2.6rem;
  border-radius: 24px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  color: #fff;
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.3s ease, background 0.3s ease;
}

.search-bar input::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

.search-bar input:focus {
  border-color: rgba(255, 107, 157, 0.5);
  background: rgba(255, 255, 255, 0.12);
}

.search-bar .search-icon {
  position: absolute;
  left: 0.9rem;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255, 255, 255, 0.4);
  font-size: 0.9rem;
  pointer-events: none;
  transition: color 0.3s ease;
}

.search-bar input:focus ~ .search-icon {
  color: rgba(255, 107, 157, 0.7);
}

/* Search Bar — Top Fixed */
.search-bar-top {
  position: fixed;
  top: 1rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 150;
  width: 90%;
  max-width: 480px;
}

.search-bar-top input {
  width: 100%;
  padding: 0.6rem 1rem 0.6rem 2.6rem;
  border-radius: 24px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  background: rgba(10, 22, 40, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: #fff;
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
}

.search-bar-top input::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

.search-bar-top input:focus {
  border-color: rgba(255, 107, 157, 0.5);
  background: rgba(10, 22, 40, 0.8);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
}

.search-bar-top .search-icon {
  position: absolute;
  left: 0.9rem;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255, 255, 255, 0.4);
  font-size: 0.9rem;
  pointer-events: none;
  transition: color 0.3s ease;
}

.search-bar-top input:focus ~ .search-icon {
  color: rgba(255, 107, 157, 0.7);
}

/* Filter Tags */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.5rem;
  margin-bottom: 2rem;
}

.filter-tag {
  padding: 0.35rem 1rem;
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.08);
  color: rgba(255, 255, 255, 0.7);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: inherit;
}

.filter-tag:hover,
.filter-tag.active {
  background: rgba(255, 107, 157, 0.3);
  border-color: rgba(255, 107, 157, 0.5);
  color: #fff;
}

/* Country tag on card */
.album-country {
  position: absolute;
  top: 1rem; left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(10px);
  padding: 0.2rem 0.6rem;
  border-radius: 10px;
  font-size: 0.75rem;
  color: rgba(255, 255, 255, 0.85);
  white-space: nowrap;
}

/* Country filter bar — same style as tag filter but distinct */
.country-bar {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
}

.country-bar .filter-tag {
  border-color: rgba(255, 255, 255, 0.15);
}

.country-bar .filter-tag:hover,
.country-bar .filter-tag.active {
  background: rgba(135, 206, 235, 0.3);
  border-color: rgba(135, 206, 235, 0.5);
}

/* Album Grid — flex wrap with floating cards */
.album-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 2rem;
  padding: 1rem 0;
}

@media (max-width: 768px) {
  .album-grid {
    gap: 1.5rem;
  }
}

/* Album Card — floating semi-transparent card */
.album-card {
  width: 240px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  overflow: visible;
  transition: box-shadow 0.4s ease,
              transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  opacity: 0;
  transform: translateY(30px);
  animation: card-in 0.6s ease forwards;
  cursor: default;
  position: relative;
  /* Lock height to cover size so layout never shifts */
  height: 240px;
}

.album-card.loaded {
  animation: float-card 6s ease-in-out infinite;
  opacity: 1;
}

.album-card:hover,
.album-card.expanded {
  transform: rotate(0deg) translateY(-6px);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(255, 107, 157, 0.1);
  z-index: 50;
  animation-play-state: paused;
}

/* Expanded overlay — floats above the grid, doesn't push siblings */
.album-card:hover .album-card-inner,
.album-card.expanded .album-card-inner {
  position: absolute;
  top: 0; left: 0;
  width: 360px;
  background: rgba(16, 24, 48, 0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(255, 107, 157, 0.15);
}

@keyframes card-in {
  to { opacity: 1; transform: translateY(0); }
}

@keyframes float-card {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* Cover */
.album-cover-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  overflow: hidden;
  flex-shrink: 0;
}

.album-cover {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
}

.album-card:hover .album-cover {
  transform: scale(1.05);
}

.album-year {
  position: absolute;
  top: 1rem; right: 1rem;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(10px);
  padding: 0.25rem 0.75rem;
  border-radius: 12px;
  font-size: 0.8rem;
  font-weight: 500;
}

.album-tags {
  position: absolute;
  top: 1rem; left: 1rem;
  display: none;
  gap: 0.4rem;
  flex-wrap: wrap;
}

.album-tag {
  background: rgba(255, 107, 157, 0.4);
  backdrop-filter: blur(10px);
  padding: 0.2rem 0.6rem;
  border-radius: 10px;
  font-size: 0.75rem;
}

/* Card Header — overlay on cover showing title + artist */
.album-card-header {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 2.5rem 1rem 1rem;
  background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
  pointer-events: none;
}

.album-card-header .album-title {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 0.15rem;
}

.album-card-header .album-artist {
  font-size: 0.85rem;
  color: rgba(255, 255, 255, 0.7);
}

/* Card Body — hidden by default, revealed on hover */
.album-card-inner {
  display: flex;
  flex-direction: column;
}

.album-body {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.4s ease,
              padding 0.4s ease;
  padding: 0 1.25rem;
  width: 100%;
  flex-shrink: 0;
}

.album-card:hover .album-body,
.album-card.expanded .album-body {
  max-height: 800px;
  opacity: 1;
  padding: 1.25rem;
}

.album-body .album-title {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 0.2rem;
}

.album-body .album-artist {
  font-size: 0.85rem;
  color: rgba(255, 255, 255, 0.6);
  margin-bottom: 0.5rem;
}

.album-body .album-tags {
  position: static;
  display: flex;
  margin-bottom: 0.8rem;
}

/* Story — always visible inside expanded body */
.album-story {
  color: rgba(255, 255, 255, 0.65);
  font-size: 0.85rem;
  line-height: 1.7;
  margin-bottom: 0.8rem;
}

/* Player */
.album-player {
  border-radius: 12px;
  overflow: hidden;
  background: rgba(0, 0, 0, 0.2);
}

.album-player iframe {
  display: block;
  width: 100%;
  height: 80px;
  border: none;
}

.song-list {
  margin-top: 0.6rem;
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.song-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.4rem 0.6rem;
  border-radius: 8px;
  transition: background 0.2s ease;
}

.song-item:hover {
  background: rgba(255, 255, 255, 0.08);
}

.song-name {
  font-size: 0.8rem;
  color: rgba(255, 255, 255, 0.8);
}

.song-link {
  font-size: 0.7rem;
  color: rgba(255, 107, 157, 0.8);
  text-decoration: none;
  white-space: nowrap;
  transition: color 0.2s ease;
}

.song-link:hover {
  color: #ff6b9d;
}

/* ===== Mobile: touch toggle ===== */
@media (max-width: 768px) {
  .album-card {
    width: 220px;
  }

  .album-card.expanded {
    transform: rotate(0deg);
  }

  .album-card:hover {
    transform: rotate(var(--rotate, 0deg));
  }

  .album-card:hover .album-body {
    max-height: 0;
    opacity: 0;
    padding: 0 1.25rem;
  }

  .album-card.expanded .album-body {
    max-height: 800px;
    opacity: 1;
    padding: 1.25rem;
    width: 100%;
  }

  .album-card:hover .album-card-inner,
  .album-card.expanded .album-card-inner {
    width: min(360px, calc(100vw - 5rem));
  }
}

/* ===== Footer ===== */
.footer {
  text-align: center;
  padding: 3rem 1rem;
  color: rgba(255, 255, 255, 0.3);
  font-size: 0.8rem;
}

/* ===== Back to Top ===== */
.back-to-top {
  position: fixed;
  bottom: 2rem; right: 2rem;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: #fff;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s ease;
  z-index: 100;
  font-family: inherit;
}

.back-to-top.visible {
  opacity: 1;
  transform: translateY(0);
}

.back-to-top:hover {
  background: rgba(255, 107, 157, 0.3);
  border-color: rgba(255, 107, 157, 0.5);
}

/* ===== Loading State ===== */
.loading {
  text-align: center;
  padding: 4rem;
  color: rgba(255, 255, 255, 0.5);
}

/* ===== Empty State ===== */
.empty {
  text-align: center;
  padding: 4rem 2rem;
  color: rgba(255, 255, 255, 0.4);
  font-size: 1.1rem;
}

/* ===== Sidebar ===== */
.sidebar {
  position: fixed;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  z-index: 160;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  padding: 0.6rem;
  background: rgba(10, 16, 30, 0.5);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 0 16px 16px 0;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-left: none;
}

.sidebar-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.2rem;
  padding: 0.6rem 0.5rem;
  border-radius: 12px;
  color: rgba(255, 255, 255, 0.5);
  text-decoration: none;
  transition: all 0.25s ease;
  min-width: 48px;
}

.sidebar-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  color: rgba(255, 255, 255, 0.85);
}

.sidebar-btn.active {
  background: rgba(255, 107, 157, 0.3);
  color: #ff6b9d;
}

.sidebar-label {
  font-size: 0.6rem;
  font-weight: 500;
  white-space: nowrap;
}

/* Shift gallery content for sidebar */
.gallery {
  padding-left: 4rem;
}

/* ===== Player Bar ===== */
.player-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: rgba(10, 16, 30, 0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  font-family: inherit;
  transition: transform 0.3s ease;
}

.player-bar.hidden {
  transform: translateY(100%);
}

.player-bar-inner {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.5rem 1.2rem;
  max-width: 1200px;
  margin: 0 auto;
}

.player-cover {
  width: 44px;
  height: 44px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
}

.player-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.player-info {
  min-width: 0;
  flex-shrink: 0;
  max-width: 160px;
}

.player-song-name {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #fff;
}

.player-artist {
  display: block;
  font-size: 0.75rem;
  color: rgba(255, 255, 255, 0.5);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-controls {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  flex-shrink: 0;
}

.player-controls button {
  background: transparent;
  border: none;
  color: rgba(255, 255, 255, 0.8);
  font-size: 1.1rem;
  cursor: pointer;
  padding: 0.3rem 0.5rem;
  border-radius: 6px;
  transition: all 0.2s ease;
  font-family: inherit;
}

.player-controls button:hover {
  color: #fff;
  background: rgba(255, 255, 255, 0.1);
}

.player-controls #playerPlay {
  font-size: 1.3rem;
  padding: 0.3rem 0.6rem;
}

.player-progress {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex: 1;
  min-width: 0;
}

.player-progress span {
  font-size: 0.7rem;
  color: rgba(255, 255, 255, 0.5);
  flex-shrink: 0;
  min-width: 32px;
  text-align: center;
}

.player-progress input[type="range"] {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(255, 255, 255, 0.15);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

.player-progress input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #ff6b9d;
  cursor: pointer;
  border: none;
}

.player-progress input[type="range"]::-moz-range-thumb {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #ff6b9d;
  cursor: pointer;
  border: none;
}

.player-volume {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-shrink: 0;
}

.player-volume span {
  font-size: 0.9rem;
  color: rgba(255, 255, 255, 0.6);
}

.player-volume input[type="range"] {

// Generate stars
(function generateStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.animationDuration = (2 + Math.random() * 3) + 's';
    star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(star);
  }
})();

// Collect all tags
function getAllTags() {
  const tagSet = new Set();
  albums.forEach(a => a.tags.forEach(t => tagSet.add(t)));
  return Array.from(tagSet);
}

// Collect all countries
function getAllCountries() {
  const countrySet = new Set();
  albums.forEach(a => { if (a.country) countrySet.add(a.country); });
  return Array.from(countrySet);
}

// Render filter bar
function renderFilterBar() {
  const bar = document.getElementById('filterBar');
  const tags = getAllTags();

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-tag active';
  allBtn.textContent = '全部';
  allBtn.onclick = () => filterAlbums(null);
  bar.appendChild(allBtn);

  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'filter-tag';
    btn.textContent = tag;
    btn.onclick = () => filterAlbums(tag);
    bar.appendChild(btn);
  });
}

// Render country filter bar
function renderCountryBar() {
  const bar = document.getElementById('countryBar');
  const countries = getAllCountries();

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-tag active';
  allBtn.textContent = '全部';
  allBtn.onclick = () => filterCountry(null);
  bar.appendChild(allBtn);

  countries.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-tag';
    btn.textContent = c;
    btn.onclick = () => filterCountry(c);
    bar.appendChild(btn);
  });
}

// Get current search keyword
function getSearchKeyword() {
  return document.getElementById('searchInput').value.trim().toLowerCase();
}

// Apply combined filter (tag + country + search)
function applyFilter() {
  const tag = currentTag;
  const country = currentCountry;
  const keyword = getSearchKeyword();

  let filtered = albums;

  if (tag) {
    filtered = filtered.filter(a => a.tags.includes(tag));
  }

  if (country) {
    filtered = filtered.filter(a => a.country === country);
  }

  if (keyword) {
    filtered = filtered.filter(a => {
      return a.title.toLowerCase().includes(keyword)
        || a.artist.toLowerCase().includes(keyword)
        || (a.country && a.country.toLowerCase().includes(keyword))
        || (a.story && a.story.toLowerCase().includes(keyword))
        || a.songs.some(s => s.name.toLowerCase().includes(keyword));
    });
  }

  renderAlbums(filtered);
}

let currentTag = null;
let currentCountry = null;

// Filter albums by tag
function filterAlbums(tag) {
  currentTag = tag;
  document.querySelectorAll('#filterBar .filter-tag').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === (tag || '全部'));
  });
  applyFilter();
}

// Filter albums by country
function filterCountry(country) {
  currentCountry = country;
  document.querySelectorAll('#countryBar .filter-tag').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === (country || '全部'));
  });
  applyFilter();
}

// Render albums
function renderAlbums(list) {
  const grid = document.getElementById('albumGrid');

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty">暂无专辑，请在数据中添加。</div>';
    return;
  }

  grid.innerHTML = list.map((album, i) => {
    const albumIndex = albums.indexOf(album);
    const songsHtml = album.songs.map((s, si) => {
      const isPlaying = currentPlayerAlbum === albumIndex && currentPlayerSong === si;
      const playingClass = isPlaying ? ' playing' : '';
      const linkLabel = s.url ? '&#9654;' : 'QQ 音乐 &#8599;';
      return `
        <div class="song-item clickable${playingClass}" data-album="${albumIndex}" data-song="${si}" onclick="playSong(${albumIndex}, ${si})">
          <span class="song-name">${escapeHtml(s.name)}</span>
          <span class="song-link">${linkLabel}</span>
        </div>`;
    }).join('');

    const playerHtml = album.songs.length > 0 ? `
      <div class="song-list">${songsHtml}</div>` : '';

    const tagsHtml = album.tags.map(t => `<span class="album-tag">${escapeHtml(t)}</span>`).join('');
    const countryHtml = album.country ? `<span class="album-country">${escapeHtml(album.country)}</span>` : '';

    const floatDelay = (Math.random() * 4).toFixed(2);
    const rotate = (Math.random() * 6 - 3).toFixed(1);

    return `
      <article class="album-card" style="animation-delay: ${i * 0.1}s, 0s ${floatDelay}s; --rotate: ${rotate}deg; transform: rotate(${rotate}deg);">
        <div class="album-card-inner">
          <div class="album-cover-wrap">
            <img class="album-cover" src="${escapeHtml(album.cover)}" alt="${escapeHtml(album.title)}" loading="lazy"
                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 300 300%22><rect fill=%22%231a3a5c%22 width=%22300%22 height=%22300%22/><text x=%22150%22 y=%22160%22 text-anchor=%22middle%22 fill=%22%23fff%22 font-size=%2248%22>&#127925;</text></svg>'">
            <span class="album-year">${escapeHtml(album.year)}</span>
            <div class="album-card-header">
              <h3 class="album-title">${escapeHtml(album.title)}</h3>
              <p class="album-artist">${escapeHtml(album.artist)}</p>
            </div>
          </div>
          <div class="album-body">
            <h3 class="album-title">${escapeHtml(album.title)}</h3>
            <p class="album-artist">${escapeHtml(album.artist)}</p>
            <div class="album-tags">${tagsHtml}</div>
            ${album.story ? `<div class="album-story">${escapeHtml(album.story)}</div>` : ''}
            ${playerHtml}
          </div>
        </div>
      </article>`;
  }).join('');

  // Re-attach touch handlers after re-render
  attachTouchHandlers();

  // Switch to floating animation after card-in completes
  document.querySelectorAll('.album-card').forEach(card => {
    card.addEventListener('animationend', function handler(e) {
      if (e.animationName === 'card-in') {
        card.classList.add('loaded');
        card.removeEventListener('animationend', handler);
      }
    });
  });
}

// Touch device detection and click toggle
function attachTouchHandlers() {
  const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

  if (!isTouchDevice) return;

  document.querySelectorAll('.album-card').forEach(card => {
    card.addEventListener('click', (e) => {
      // Don't toggle if clicking a link inside the card
      if (e.target.closest('a') || e.target.closest('iframe')) return;

      const wasExpanded = card.classList.contains('expanded');

      // Collapse all other cards
      document.querySelectorAll('.album-card.expanded').forEach(c => {
        if (c !== card) c.classList.remove('expanded');
      });

      card.classList.toggle('expanded', !wasExpanded);
    });
  });
}

// Escape HTML
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Back to top
const backToTop = document.getElementById('backToTop');
window.addEventListener('scroll', () => {
  backToTop.classList.toggle('visible', window.scrollY > 400);
});
backToTop.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// Search input — debounce 200ms
let searchTimer;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilter, 200);
});

// Parallax sky
window.addEventListener('scroll', () => {
  const scroll = window.scrollY;
  const maxScroll = document.body.scrollHeight - window.innerHeight;
  const progress = Math.min(scroll / (maxScroll * 0.5), 1);

  const sky = document.getElementById('sky');
  if (progress < 0.33) {
    sky.style.background = `linear-gradient(180deg,
      #0a1628 0%,
      #0f2040 20%,
      #1a3a5c 45%,
      #4a90d9 75%,
      #87ceeb 100%)`;
  } else if (progress < 0.66) {
    sky.style.background = `linear-gradient(180deg,
      #1a3a5c 0%,
      #4a90d9 25%,
      #87ceeb 50%,
      #f0c8a0 75%,
      #ff9a76 100%)`;
  } else {
    sky.style.background = `linear-gradient(180deg,
      #2a1a4a 0%,
      #4a2a6a 20%,
      #c8a8e8 45%,
      #ff6b9d 70%,
      #ff9a76 100%)`;
  }
});

// ============================================================
// Built-in Audio Player
// ============================================================
let audio = new Audio();
audio.volume = 0.8;
let playQueue = [];
let playIndex = -1;
let currentPlayerAlbum = -1;
let currentPlayerSong = -1;

function playSong(albumIndex, songIndex) {
  const album = albums[albumIndex];
  const song = album.songs[songIndex];
  if (!song) return;

  // No url: fallback to QQ Music link
  if (!song.url) {
    if (song.songmid) {
      window.open(`https://y.qq.com/n/ryqq/songDetail/${song.songmid}`, '_blank');
    }
    return;
  }

  // Set up queue with all songs in the album
  playQueue = album.songs.map((s, i) => ({ albumIndex, songIndex: i, song: s }));
  playIndex = songIndex;
  currentPlayerAlbum = albumIndex;
  currentPlayerSong = songIndex;

  audio.src = song.url;
  audio.play().catch(() => {});

  // Update UI
  document.getElementById('playerCoverImg').src = album.cover;
  document.getElementById('playerSongName').textContent = song.name;
  document.getElementById('playerArtist').textContent = album.artist;
  document.getElementById('playerBar').classList.remove('hidden');
  document.getElementById('playerPlay').innerHTML = '&#9646;&#9646;';

  renderPlaylist();
  updatePlayingHighlight();
}

function updatePlayingHighlight() {
  // Clear old highlights
  document.querySelectorAll('.song-item.playing').forEach(el => el.classList.remove('playing'));
  // Add new highlight
  if (currentPlayerAlbum >= 0 && currentPlayerSong >= 0) {
    const el = document.querySelector(`.song-item[data-album="${currentPlayerAlbum}"][data-song="${currentPlayerSong}"]`);
    if (el) el.classList.add('playing');
  }
}

function getCurrentFilteredAlbums() {
  const tag = currentTag;
  const country = currentCountry;
  const keyword = getSearchKeyword();
  let filtered = albums;
  if (tag) filtered = filtered.filter(a => a.tags.includes(tag));
  if (country) filtered = filtered.filter(a => a.country === country);
  if (keyword) {
    filtered = filtered.filter(a => {
      return a.title.toLowerCase().includes(keyword)
        || a.artist.toLowerCase().includes(keyword)
        || (a.country && a.country.toLowerCase().includes(keyword))
        || (a.story && a.story.toLowerCase().includes(keyword))
        || a.songs.some(s => s.name.toLowerCase().includes(keyword));
    });
  }
  return filtered;
}

function renderPlaylist() {
  const pl = document.getElementById('playerPlaylist');
  pl.innerHTML = playQueue.map((item, i) => `
    <div class="playlist-item${i === playIndex ? ' active' : ''}" onclick="playQueueIndex(${i})">
      <img class="playlist-item-cover" src="${escapeHtml(albums[item.albumIndex].cover)}" alt="">
      <div class="playlist-item-info">
        <span class="playlist-item-name">${escapeHtml(item.song.name)}</span>
        <span class="playlist-item-artist">${escapeHtml(albums[item.albumIndex].artist)}</span>
      </div>
    </div>
  `).join('');
}

function playQueueIndex(i) {
  if (i >= 0 && i < playQueue.length) {
    playSong(playQueue[i].albumIndex, playQueue[i].songIndex);
  }
}

function formatTime(s) {
  if (isNaN(s) || !isFinite(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function initPlayer() {
  const progress = document.getElementById('playerProgress');
  const volume = document.getElementById('playerVolume');

  // Play/Pause
  document.getElementById('playerPlay').addEventListener('click', () => {
    if (!audio.src) return;
    if (audio.paused) {
      audio.play().catch(() => {});
    } else {
      audio.pause();
    }
  });

  // Prev
  document.getElementById('playerPrev').addEventListener('click', () => {
    if (playQueue.length === 0) return;
    const newIdx = playIndex <= 0 ? playQueue.length - 1 : playIndex - 1;
    playSong(playQueue[newIdx].albumIndex, playQueue[newIdx].songIndex);
  });

  // Next
  document.getElementById('playerNext').addEventListener('click', () => {
    if (playQueue.length === 0) return;
    const newIdx = playIndex >= playQueue.length - 1 ? 0 : playIndex + 1;
    playSong(playQueue[newIdx].albumIndex, playQueue[newIdx].songIndex);
  });

  // Time update
  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      progress.value = (audio.currentTime / audio.duration) * 1000;
      document.getElementById('playerCurrentTime').textContent = formatTime(audio.currentTime);
      document.getElementById('playerDuration').textContent = formatTime(audio.duration);
    }
  });

  audio.addEventListener('ended', () => {
    if (playQueue.length === 0) return;
    const newIdx = playIndex >= playQueue.length - 1 ? 0 : playIndex + 1;
    playSong(playQueue[newIdx].albumIndex, playQueue[newIdx].songIndex);
  });

  audio.addEventListener('play', () => {
    document.getElementById('playerPlay').innerHTML = '&#9646;&#9646;';
  });

  audio.addEventListener('pause', () => {
    document.getElementById('playerPlay').innerHTML = '&#9654;';
  });

  // Progress seek
  progress.addEventListener('input', () => {
    if (audio.duration) {
      audio.currentTime = (progress.value / 1000) * audio.duration;
    }
  });

  // Volume
  volume.addEventListener('input', () => {
    audio.volume = volume.value / 100;
  });

  // Playlist toggle
  document.getElementById('playerToggle').addEventListener('click', () => {
    document.getElementById('playerPlaylist').classList.toggle('open');
  });
}

// Init (after all declarations)
renderFilterBar();
renderCountryBar();
renderAlbums(albums);
initPlayer();
</script>

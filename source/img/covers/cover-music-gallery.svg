<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Disboundia article cover - music gallery rebuild</title>
  <desc id="desc">A same-series music cover with vinyl record and network graph motifs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.38" stop-color="#132456"/>
      <stop offset="0.7" stop-color="#3730a3"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="halo" cx="75%" cy="25%" r="70%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.52"/>
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
      <circle cx="0" cy="0" r="2" fill="#ffffff" fill-opacity="0.14"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#halo)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <g transform="translate(1050 188)" filter="url(#glow)">
    <circle cx="190" cy="250" r="220" fill="#020617" fill-opacity="0.52" stroke="#67e8f9" stroke-opacity="0.58"/>
    <circle cx="190" cy="250" r="160" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="24"/>
    <circle cx="190" cy="250" r="92" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="20"/>
    <circle cx="190" cy="250" r="56" fill="#67e8f9" fill-opacity="0.68"/>
    <circle cx="190" cy="250" r="12" fill="#020617" fill-opacity="0.78"/>
    <g stroke="#c4b5fd" stroke-opacity="0.62" stroke-width="3">
      <path d="M-20 84 82 172 4 318 130 380 326 360 420 192"/>
      <path d="M82 172 190 250 326 360M4 318 190 250 420 192"/>
    </g>
    <g fill="#fff">
      <circle cx="-20" cy="84" r="12"/><circle cx="82" cy="172" r="10"/><circle cx="4" cy="318" r="12"/>
      <circle cx="130" cy="380" r="10"/><circle cx="326" cy="360" r="12"/><circle cx="420" cy="192" r="12"/>
    </g>
  </g>
  <g font-family="'PingFang SC','Microsoft YaHei','Segoe UI',Arial,sans-serif" fill="#fff">
    <text x="112" y="140" font-size="30" letter-spacing="6" opacity="0.78">DISBOUNDIA</text>
    <rect x="112" y="184" width="270" height="48" rx="24" fill="#22d3ee" fill-opacity="0.18" stroke="#67e8f9" stroke-opacity="0.44"/>
    <text x="136" y="217" font-size="24" fill="#cffafe">音乐馆 / CANVAS</text>
    <text x="112" y="335" font-size="78" font-weight="800">音乐馆重构</text>
    <text x="112" y="430" font-size="78" font-weight="800">关系图 + 播放器</text>
    <text x="116" y="510" font-size="30" fill="#dbeafe">唱片架、专辑网络与站内播放体验</text>
    <text x="116" y="790" font-size="26" fill="#bfdbfe">2026-04-29</text>
  </g>
</svg>

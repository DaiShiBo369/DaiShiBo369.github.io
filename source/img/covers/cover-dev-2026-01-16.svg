<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Disboundia article cover - Hexo initialization</title>
  <desc id="desc">A blue violet abstract cover for a Disboundia development log.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09111f"/>
      <stop offset="0.42" stop-color="#1c2d60"/>
      <stop offset="0.72" stop-color="#3443a2"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="halo" cx="75%" cy="24%" r="70%">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0.58"/>
      <stop offset="0.42" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#ffffff" stroke-opacity="0.055"/>
      <circle cx="0" cy="0" r="2" fill="#ffffff" fill-opacity="0.16"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#halo)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <path d="M1120 118c156 24 274 124 312 256 42 146-32 302-172 366-132 60-306 26-418-86-118-118-146-292-66-414 70-106 198-142 344-122Z" fill="#020617" fill-opacity="0.22"/>
  <g opacity="0.32" stroke="#ffffff" stroke-width="2">
    <path d="M100 725C320 628 480 694 638 562c126-105 220-276 420-278 160-2 260 104 426 64" fill="none"/>
    <path d="M130 770C352 675 516 742 678 610c124-101 220-250 414-252 150-2 250 86 382 58" fill="none" opacity="0.45"/>
  </g>
  <g transform="translate(1000 270)" filter="url(#glow)">
    <rect x="-28" y="-28" width="336" height="224" rx="24" fill="#111827" fill-opacity="0.56" stroke="#93c5fd" stroke-opacity="0.55"/>
    <path d="M24 38h232M24 86h150M24 134h196" stroke="#a5b4fc" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
    <path d="M-110 252 40 170l150 82-150 82-150-82Z" fill="#60a5fa" fill-opacity="0.18" stroke="#67e8f9" stroke-opacity="0.62"/>
    <path d="M40 170v164M-110 252v88l150 82 150-82v-88" fill="none" stroke="#c4b5fd" stroke-opacity="0.48"/>
  </g>
  <g font-family="'PingFang SC','Microsoft YaHei','Segoe UI',Arial,sans-serif" fill="#fff">
    <text x="112" y="140" font-size="30" letter-spacing="6" opacity="0.78">DISBOUNDIA</text>
    <rect x="112" y="184" width="238" height="48" rx="24" fill="#67e8f9" fill-opacity="0.18" stroke="#67e8f9" stroke-opacity="0.38"/>
    <text x="136" y="217" font-size="24" fill="#cffafe">开发日志 / HEXO</text>
    <text x="112" y="335" font-size="78" font-weight="800">从 Hexo 初始化到</text>
    <text x="112" y="430" font-size="78" font-weight="800">AnZhiYu 主题调试</text>
    <text x="116" y="510" font-size="30" fill="#dbeafe">配置、部署、图床与错误排查的起点</text>
    <text x="116" y="790" font-size="26" fill="#bfdbfe">2026-01-16</text>
  </g>
</svg>

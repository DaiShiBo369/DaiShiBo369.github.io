<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Disboundia article cover - interface refinement</title>
  <desc id="desc">A same-series blue violet cover for a Disboundia UI development log.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.45" stop-color="#18244f"/>
      <stop offset="0.76" stop-color="#2f4aa8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="halo" cx="72%" cy="30%" r="68%">
      <stop offset="0" stop-color="#f0abfc" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#60a5fa" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
      <circle cx="0" cy="0" r="2" fill="#ffffff" fill-opacity="0.14"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#halo)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <g transform="translate(980 205)" filter="url(#glow)">
    <rect x="0" y="0" width="410" height="260" rx="34" fill="#ffffff" fill-opacity="0.1" stroke="#bae6fd" stroke-opacity="0.56"/>
    <rect x="42" y="48" width="166" height="136" rx="20" fill="#38bdf8" fill-opacity="0.24"/>
    <rect x="234" y="48" width="124" height="30" rx="15" fill="#c4b5fd" fill-opacity="0.62"/>
    <rect x="234" y="104" width="102" height="22" rx="11" fill="#e0f2fe" fill-opacity="0.42"/>
    <rect x="234" y="146" width="140" height="22" rx="11" fill="#e0f2fe" fill-opacity="0.28"/>
    <rect x="-72" y="330" width="410" height="172" rx="34" fill="#020617" fill-opacity="0.32" stroke="#c4b5fd" stroke-opacity="0.46"/>
    <circle cx="12" cy="416" r="46" fill="#22d3ee" fill-opacity="0.34"/>
    <path d="M94 386h180M94 428h220" stroke="#ffffff" stroke-opacity="0.56" stroke-width="18" stroke-linecap="round"/>
  </g>
  <g opacity="0.28" stroke="#ffffff" stroke-width="2">
    <circle cx="1188" cy="420" r="310" fill="none"/>
    <circle cx="1188" cy="420" r="220" fill="none"/>
    <circle cx="1188" cy="420" r="120" fill="none"/>
  </g>
  <g font-family="'PingFang SC','Microsoft YaHei','Segoe UI',Arial,sans-serif" fill="#fff">
    <text x="112" y="140" font-size="30" letter-spacing="6" opacity="0.78">DISBOUNDIA</text>
    <rect x="112" y="184" width="250" height="48" rx="24" fill="#a78bfa" fill-opacity="0.18" stroke="#c4b5fd" stroke-opacity="0.44"/>
    <text x="136" y="217" font-size="24" fill="#ede9fe">开发日志 / UI</text>
    <text x="112" y="335" font-size="78" font-weight="800">解决时间错误后的</text>
    <text x="112" y="430" font-size="78" font-weight="800">界面优化记录</text>
    <text x="116" y="510" font-size="30" fill="#dbeafe">社交入口、关于页与主题视觉整理</text>
    <text x="116" y="790" font-size="26" fill="#bfdbfe">2026-01-17</text>
  </g>
</svg>

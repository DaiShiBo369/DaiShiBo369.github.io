    <path d="M88 64h286c36 0 66 30 66 66v220c0 36-30 66-66 66H88c-36 0-66-30-66-66V130c0-36 30-66 66-66Z" fill="#020617" fill-opacity="0.38" stroke="#f0abfc" stroke-opacity="0.52"/>

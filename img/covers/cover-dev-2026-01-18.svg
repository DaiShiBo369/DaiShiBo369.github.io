<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Disboundia article cover - theme debugging</title>
  <desc id="desc">A same-series abstract cover about debugging and interface polishing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.46" stop-color="#241d58"/>
      <stop offset="0.75" stop-color="#4c1d95"/>
      <stop offset="1" stop-color="#f472b6"/>

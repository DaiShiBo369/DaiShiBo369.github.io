  <g opacity="0.3" stroke="#ffffff" stroke-width="2">
    <path d="M82 720c224-84 382-28 548-144 144-100 226-252 426-250 166 2 270 104 454 78" fill="none"/>
    <path d="M116 774c222-76 382-30 550-140 134-88 236-218 422-216 152 2 252 78 392 58" fill="none" opacity="0.55"/>
  </g>

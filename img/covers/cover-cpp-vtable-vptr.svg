    <text x="46" y="454" font-size="28" fill="#f8fafc" opacity="0.9">Dog object</text>
    <rect x="472" y="0" width="318" height="496" rx="26" fill="#020617" fill-opacity="0.66" stroke="#fbbf24" stroke-opacity="0.64"/>
    <text x="520" y="62" font-size="34" fill="#fef3c7" font-weight="800">Dog vtable</text>

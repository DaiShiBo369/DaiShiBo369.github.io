    <path d="M632 258l-24-32h48Z" fill="#fbbf24"/>
    <rect x="506" y="424" width="252" height="82" rx="18" fill="#134e4a" fill-opacity="0.72" stroke="#99f6e4" stroke-opacity="0.52"/>

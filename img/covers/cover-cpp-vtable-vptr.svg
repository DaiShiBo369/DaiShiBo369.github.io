      <circle cx="0" cy="0" r="2" fill="#ffffff" fill-opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#halo)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

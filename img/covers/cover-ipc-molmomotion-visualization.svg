      <circle cx="462" cy="144" r="12"/>
      <circle cx="462" cy="396" r="12"/>
      <circle cx="244" cy="522" r="12"/>
      <circle cx="26" cy="396" r="12"/>
      <circle cx="26" cy="144" r="12"/>

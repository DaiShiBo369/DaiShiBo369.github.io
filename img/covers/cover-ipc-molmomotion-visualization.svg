<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">IPC and MolmoMotion visualization cover</title>
  <desc id="desc">A research cover showing contact simulation and 3D motion prediction as connected geometric trajectories.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07141d"/>
      <stop offset="0.42" stop-color="#123b3a"/>
      <stop offset="0.72" stop-color="#27326b"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="light" cx="74%" cy="26%" r="72%">
      <stop offset="0" stop-color="#99f6e4" stop-opacity="0.46"/>
      <stop offset="0.48" stop-color="#c4b5fd" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M70 0H0V70" fill="none" stroke="#ffffff" stroke-opacity="0.055"/>
      <circle cx="0" cy="0" r="2" fill="#ffffff" fill-opacity="0.15"/>
    </pattern>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#light)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <path d="M874 124c238 14 434 166 474 368 42 216-122 364-352 318-244-48-424-230-426-430-2-166 116-266 304-256Z" fill="#020617" fill-opacity="0.24"/>

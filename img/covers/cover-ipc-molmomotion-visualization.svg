    <g fill="#fde68a">
      <circle cx="-76" cy="408" r="14"/>
      <circle cx="154" cy="284" r="14"/>
      <circle cx="330" cy="142" r="14"/>
      <circle cx="524" cy="180" r="14"/>
    </g>
    <rect x="-86" y="42" width="206" height="78" rx="8" fill="#0f172a" fill-opacity="0.84" stroke="#5eead4" stroke-opacity="0.48"/>
    <text x="-50" y="92" font-size="32" font-family="'Segoe UI',Arial,sans-serif" fill="#ccfbf1">IPC</text>
    <rect x="344" y="432" width="292" height="78" rx="8" fill="#0f172a" fill-opacity="0.84" stroke="#c4b5fd" stroke-opacity="0.52"/>
    <text x="374" y="482" font-size="32" font-family="'Segoe UI',Arial,sans-serif" fill="#ede9fe">MolmoMotion</text>

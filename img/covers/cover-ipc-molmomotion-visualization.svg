    <path d="M120 770c222-80 388-30 552-144 134-92 230-218 418-214 146 4 246 78 388 56" opacity="0.55"/>
  </g>
  <g font-family="'PingFang SC','Microsoft YaHei','Segoe UI',Arial,sans-serif" fill="#fff">

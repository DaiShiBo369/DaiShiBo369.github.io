    <g stroke="#a7f3d0" stroke-width="5" stroke-opacity="0.62" fill="none">
      <path d="M244 18v252M26 144l218 126 218-126M26 396l218-126 218 126"/>
      <path d="M128 86v252M360 86v252M128 454V206M360 454V206"/>
      <path d="M76 270h336"/>
    </g>
    <g fill="#f8fafc">
